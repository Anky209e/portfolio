params:
  title: "Anky209e Portfolio website"
  description: Click to know more about Ankit - a Software Engineer specializing in backend development, machine learning, and AI.
  # staticPath: ""  # The path to serve the static files from 
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  color:
    # Gruvbox Light Theme
    # bg0 / main background: #FBF1C7  fg0 / main text: #3C3836
    textColor: "#3C3836"
    secondaryTextColor: "#7C6F64"
    textLinkColor: "#458588"
    backgroundColor: "#FBF1C7"
    secondaryBackgroundColor: "#EBDBB2"
    primaryColor: "#D65D0E"
    secondaryColor: "#EBDBB2"

    darkmode:
      # Dracula Theme Palette
      # bg / main background: #282A36  fg / main text: #F8F8F2
      textColor: "#F8F8F2"
      secondaryTextColor: "#6272A4"
      textLinkColor: "#8BE9FD"
      backgroundColor: "#282A36"
      secondaryBackgroundColor: "#44475A"
      primaryColor: "#BD93F9"
      secondaryColor: "#44475A"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Anky209e" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Ankit Kumar"
    subtitle: "AI/ML Engineer & Backend Developer"
    content: "Highly skilled AI/ML Engineer and Backend Developer with hands-on experience in building and deploying production-grade Large Language Models (LLMs) and Retrieval-Augmented Generation (RAG) systems. Proven ability to translate complex data science problems into scalable software solutions."
    image: /images/me.png
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "/resume.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/anky209e
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/anky209e/
      customIcons:
        - icon: /fav.png
          name: Modelsmith
          url: "https://modelsmith.app/"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/hero.svg"
    roundImage: false
    content: |-
      Hi, I'm Ankit Kumar, an AI/ML Engineer and Backend Developer passionate about bridging the gap between complex data science research and production-grade software engineering. 

      Over my career and freelance consulting, I have designed and deployed multiple conversational AI systems and LLM/RAG architectures, including building and fine-tuning transformer models from scratch. During my time at the Indian Space Research Organisation (ISRO), I designed Reinforcement Learning simulators for Lunar landing trajectories and engineered high-throughput telemetry pipelines. 

      Whether it's optimizing physical solvers, training 10+ distinct machine learning architectures, or scaling backend services for thousands of active users, I love building performant, scalable, and intelligent systems.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Python & SQL"
        - "PyTorch & TensorFlow"
        - "Generative AI & RAG"
        - "Reinforcement Learning"
        - "Django & FastAPI"
        - "Docker & CI/CD"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - job: "AI/ML Research"
        company: "Indian Institute of Technology, Guwahati"
        companyUrl: "https://www.iitg.ac.in"
        date: "Jun 2026 - Present"
        logo: "/images/iitg-logo.jpg"
        info:
          enable: true
          content: "Conducting research on next-generation AI, ML, and LLM architectures."
        content: |
          * Conducting research on next-generation AI, Machine Learning, and Large Language Model (LLM) architectures with a focus on improving efficiency, reasoning, and scalability.
          * Exploring state-of-the-art Transformer architectures, multimodal models, Mixture of Experts (MoE), diffusion models, and emerging foundation model techniques.
          * Designing and implementing deep learning models using PyTorch and Python for experimentation and evaluation.

      - job: "Freelance AI/ML Engineer | Consultant"
        company: "Freelance Consulting"
        companyUrl: "#"
        date: "July 2024 – Present"
        info:
          enable: true
          content: "Freelance consulting in AI/ML architectures and LLM/RAG systems."
        content: |
          * Designed and deployed 4+ production-grade Large Language Models (LLMs) and Retrieval-Augmented Generation (RAG) systems for domain-specific applications, achieving a 20% improvement in search/retrieval performance.
          * Built and fine-tuned transformer-based Large Language Models (LLMs), including training a 124M parameter model from scratch.
          * Designed and implemented end-to-end conversational AI solutions that scaled to handle 5,000+ daily user interactions.
          * Reduced harmful output instances by 95% through the implementation of AI safety guardrails and advanced prompt engineering techniques.

      - job: "Project Intern"
        company: "ISRO - Indian Space Research Organisation"
        companyUrl: "https://www.isro.gov.in"
        logo: "/images/isro-logo.png"
        date: "May 2024 – July 2024"
        featuredLink:
          enable: true
          name: "View the project"
          url: "https://docs.google.com/document/d/1uhJ3qluwSfv4Fjt-8RPURmRJHRbLNDZNzZUYC_tpjN8/edit?usp=sharing"
        info:
          enable: true
          content: "Optimized autonomous systems using Reinforcement Learning."
        content: |
          * Optimized autonomous Lunar landing simulations using Reinforcement Learning agents, reducing trajectory error margin by 15% over baseline heuristics.
          * Engineered Range Operations data pipelines to process 10,000+ data points per second, enabling real-time fault forecasting with 90% accuracy.
          * Designed a low-level hardware processing layer in Python/C to increase telemetry throughput by 2X and condition GBs of multi-sensor telemetry for RL training loops.
          * Collaborated closely with a team of distinguished Scientists to prototype mission-critical software frameworks.

      - job: "Backend Developer Intern"
        company: "Ecowiser"
        companyUrl: "https://wiser.eco"
        date: "Nov 2022 - Apr 2023"
        featuredLink:
