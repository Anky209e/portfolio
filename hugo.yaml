        content: |
          * Designed and scaled production backend services for a core Chrome Extension and Web ecosystem supporting 10,000+ active users utilizing Django Rest Framework.
          * Accelerated internal search query speeds by 30% through the integration of custom NLP tokenization into PostgreSQL Full-Text Search.
          * Built an asynchronous, automated customer engagement pipeline utilizing Redis and Celery, processing over 5,000 scheduled feedback dispatches daily.

      - job: "Machine Learning Intern"
